name: Publish to AUR

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256sum
        id: checksum
        run: |
          url="https://github.com/musqz/beautysolar-icon-theme/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha=$(curl -fsSL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.meta.outputs.pkgver }}/" packaging/PKGBUILD
          sed -i "s/sha256sums=('SKIP')/sha256sums=('${{ steps.checksum.outputs.sha256 }}')/" packaging/PKGBUILD

      - name: Generate .SRCINFO
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: -v ${{ github.workspace }}/packaging:/pkg
          run: |
            pacman -Sy --noconfirm base-devel
            cd /pkg
            makepkg --printsrcinfo > .SRCINFO

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: beautysolar-icon-theme
          pkgbuild: ./packaging/PKGBUILD
          srcinfo: ./packaging/.SRCINFO
          commit_username: ${{ github.actor }}
          commit_email: hula-until-satin@duck.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "update to ${{ steps.meta.outputs.pkgver }}"
          force_push: true
